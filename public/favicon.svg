<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" fill="white"/>
  <!-- Outer Y strokes -->
  <polyline points="10,8 50,52 90,8" stroke="black" stroke-width="14" stroke-linecap="butt" stroke-linejoin="miter" fill="none"/>
  <line x1="50" y1="52" x2="50" y2="94" stroke="black" stroke-width="14" stroke-linecap="butt" fill="none"/>
  <!-- Inner cutout to create double-line effect -->
  <polyline points="10,8 50,52 90,8" stroke="white" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter" fill="none"/>
  <line x1="50" y1="52" x2="50" y2="94" stroke="white" stroke-width="5" stroke-linecap="butt" fill="none"/>
</svg>
